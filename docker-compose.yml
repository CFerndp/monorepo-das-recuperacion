# docker-compose.yml
# Orquesta los tres servicios de la aplicación: frontend, backend y base de datos.
# Usa esto para ver el stack completo funcionando. Para desarrollar, arranca cada
# servicio por separado (ver README de frontend y backend).

services:
  # --- BASE DE DATOS ---
  # PostgreSQL 16. Solo se usa en el entorno Docker (en local, Django usa SQLite).
  postgres:
    image: postgres:16-alpine
    container_name: postgres-das
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=das_user
      - POSTGRES_PASSWORD=das_password
      - POSTGRES_DB=das_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U das_user -d das_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BACKEND ---
  # Django. USE_POSTGRES=true le indica a settings.py que use PostgreSQL en vez de SQLite.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-das
    ports:
      - "8000:8000"
    environment:
      - USE_POSTGRES=true
      - POSTGRES_DB=das_db
      - POSTGRES_USER=das_user
      - POSTGRES_PASSWORD=das_password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # --- FRONTEND ---
  # Next.js. NEXT_PUBLIC_API_URL se pasa como build arg porque Next.js
  # resuelve las variables NEXT_PUBLIC_* en tiempo de build, no en runtime.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: frontend-das
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    external: false

volumes:
  postgres_data:
    driver: local
