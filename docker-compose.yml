services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-das
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: postgres-das
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=das_user
      - POSTGRES_PASSWORD=das_password
      - POSTGRES_DB=das_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U das_user -d das_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-das
    ports:
      - "8000:8000"
    environment:
      - USE_POSTGRES=true
      - POSTGRES_DB=das_db
      - POSTGRES_USER=das_user
      - POSTGRES_PASSWORD=das_password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DJANGO_SECRET_KEY=django-insecure-secret-key-change-in-production
      - DEBUG=True
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    external: false

volumes:
  postgres_data:
    driver: local
